services:
  - type: pserv
    runtime: docker
    name: cip-mysql
    repo: https://github.com/render-examples/mysql.git
    plan: starter
    envVars:
      - key: MYSQL_DATABASE
        value: cip_db
      - key: MYSQL_USER
        value: cip_user
      - key: MYSQL_PASSWORD
        generateValue: true
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10

  - type: web
    runtime: node
    name: college-information-portal
    rootDir: old_files_snapshot
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeployTrigger: commit
    healthCheckPath: /healthz
    envVars:
      - key: DB_HOST
        fromService:
          type: pserv
          name: cip-mysql
          property: host
      - key: DB_PORT
        fromService:
          type: pserv
          name: cip-mysql
          property: port
      - key: DB_NAME
        fromService:
          type: pserv
          name: cip-mysql
          envVarKey: MYSQL_DATABASE
      - key: DB_USER
        fromService:
          type: pserv
          name: cip-mysql
          envVarKey: MYSQL_USER
      - key: DB_PASSWORD
        fromService:
          type: pserv
          name: cip-mysql
          envVarKey: MYSQL_PASSWORD
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d
